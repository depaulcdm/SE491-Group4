name: .NET Core Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    - name: Restore Dependencies
      run: dotnet restore **/*Tests.csproj

    # Build test project
    - name: Build Test Project
      run: dotnet build **/*Tests.csproj --no-restore --configuration Release

    # Runs all tests inside BEEST.Tests project
    - name: Run Tests
      run: dotnet test **/*Tests.csproj --no-build --configuration Release --verbosity normal
